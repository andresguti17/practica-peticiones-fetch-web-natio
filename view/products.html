<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</head>

<body>

    <div class="container">
        <h1>Lista productos</h1>
        <label for="">Id</label>
        <input id="idFilter" type="text" class="form-control" onchange="getFindByIdProduct()">
        <br>
        <button class="btn btn-success" onclick="getAllProducts()">Get</button>
        <button class="btn btn-secondary" data-bs-toggle="modal" data-bs-target="#modalAgregar">Add</button>
        <br>

        <div class="modal fade" id="modalAgregar" tabindex="-1" aria-labelledby="modalAgregarLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h1 class="modal-title fs-5" id="modalAgregarLabel">Add product</h1>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <form onsubmit="createProduct(event)">
                        <div class="modal-body">

                            <label for="">Title</label>
                            <br>
                            <input id="titleCreate" type="text" required>
                            <br><br>
                            <label for="">Price</label>
                            <br>
                            <input id="priceCreate" type="number" required>

                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                            
                            <button type="submit" class="btn btn-primary" data-bs-dismiss="modal">Add</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>


        <div class="modal fade" id="modalActualizar" tabindex="-1" aria-labelledby="modalActualizarLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h1 class="modal-title fs-5" id="modalActualizarLabel">Update product</h1>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <form onsubmit="updateProduct(event)">
                        <div class="modal-body">

                            <p id="idUpdate"></p>
                            <label for="">Title</label>
                            <br>
                            <input id="titleUpdate" type="text" required>
                            <br><br>
                            <label for="">Price</label>
                            <br>
                            <input id="priceUpdate" type="number" required>

                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                            <button type="submit" class="btn btn-primary" data-bs-dismiss="modal" onclick="updateProduct(event)">Update</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- <p id="Result"></p> -->
        <table class="table">
            <thead>
                <tr>
                    <th>Id</th>
                    <th>Title</th>
                    <th>Price</th>
                    <th>Options</th>
                </tr>
            </thead>
            <tbody id="container">

            </tbody>
        </table>
    </div>
    <script src="/js/const.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/crud.js"></script>
    <script src="/js/products.js"></script>
</body>

</html>
