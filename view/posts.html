        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</head>

<nav class="navbar navbar-expand-lg bg-body-tertiary">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">Exercise</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="/view/products.html">Products</a>
        </li>
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="/view/carts.html">Carts</a>

          <a class="nav-link active" aria-current="page" href="/view/users.html">Users</a>

          <a class="nav-link active" aria-current="page" href="#">Posts</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<body>

    <div class="container">
        <h1>List posts</h1>
        <label for="">Id</label>
        <input id="idFilter" type="text" class="form-control" onchange="getFindByIdPosts()">
        <br>
        <button class="btn btn-success" onclick="getAllPosts()">Get</button>
        <button onclick="modalAddPost()" class="btn btn-secondary" data-bs-toggle="modal" data-bs-target="#modalAgregar">Add</button>
        <br>

        <div class="modal fade" id="modalAgregar" tabindex="-1" aria-labelledby="modalAgregarLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h1 class="modal-title fs-5" id="modalAgregarLabel">Add post</h1>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <form onsubmit="createPost(event)">
                        <div class="modal-body" id="modalAdd-content">

                            

                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                            
                            <button type="submit" class="btn btn-primary" data-bs-dismiss="modal">Add</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>


        <div class="modal fade" id="modalActualizar" tabindex="-1" aria-labelledby="modalActualizarLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h1 class="modal-title fs-5" id="modalActualizarLabel">Update post</h1>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <form onsubmit="updatePost(event)">
                        <div class="modal-body" id="modalUpdate-content">

                            

                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                            <button type="submit" class="btn btn-primary" data-bs-dismiss="modal" onclick="updatePost(event)">Update</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- <p id="Result"></p> -->
        <table class="table">
            <thead>
                <tr id="lista">
                    
                </tr>
            </thead>
            <tbody id="container">

            </tbody>
        </table>
    </div>
    <script src="/js/const.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/crud.js"></script>
    <script src="/js/endpoints/posts.js"></script>
</body>

</html>
